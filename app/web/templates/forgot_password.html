{% extends "base.html" %}
{% block title %}パスワード再設定{% endblock %}
{% block content %}
<div class="admin-console" style="max-width: 28rem; margin: 2rem auto">
  <h1 class="page-title">パスワード再設定</h1>
  <p class="muted page-lead">
    アカウントに<strong>登録済みのメールアドレス</strong>と、<strong>ユーザーID</strong>の両方が一致する場合のみ、再設定用のリンクをメールで送信します（SMTP 設定が必要です）。
  </p>
  <div class="panel admin-section">
    <div class="admin-field">
      <label for="fp-user">ユーザーID</label>
      <input type="text" id="fp-user" autocomplete="username" class="booking-dialog__input-wide" />
    </div>
    <div class="admin-field">
      <label for="fp-email">登録メールアドレス</label>
      <input type="email" id="fp-email" autocomplete="email" class="booking-dialog__input-wide" />
    </div>
    <p id="fp-msg" class="admin-msg" role="alert"></p>
    <button type="button" class="btn primary" id="btn-fp">送信する</button>
    <p class="muted small" style="margin-top: 1rem">
      メール未登録・SMTP 未設定の場合は、<strong>管理者にパスワード再設定を依頼</strong>してください（管理画面のアカウント一覧から新パスワードを設定できます）。
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function () {
  const msg = document.getElementById('fp-msg');
  document.getElementById('btn-fp').addEventListener('click', async function () {
    msg.textContent = '';
    msg.className = 'admin-msg';
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('fp-user').value.trim(),
        email: document.getElementById('fp-email').value.trim(),
      }),
    });
    const j = await r.json().catch(function () { return {}; });
    if (!r.ok) {
      msg.className = 'admin-msg err';
      msg.textContent = (j.detail && (typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail))) || r.statusText;
      return;
    }
    msg.className = 'admin-msg ok';
    msg.textContent = j.message || '処理しました。メールをご確認ください。';
  });
})();
</script>
{% endblock %}
