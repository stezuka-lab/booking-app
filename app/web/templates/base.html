<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>{% block title %}予約{% endblock %} · Booking</title>
  <link rel="stylesheet" href="/assets/web/app.css" />
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="app-busy-indicator" id="app-busy-indicator" hidden aria-live="polite">読み込み中…</div>
  <header class="app-header">
    <a class="app-brand" href="/app">
      <span class="app-brand-mark" aria-hidden="true"></span>
      <span class="app-brand-copy">
        <strong>予約デスク</strong>
        <span>予定調整をひとつの画面で</span>
      </span>
    </a>
    <nav class="app-nav">
      <span class="nav-auth-only app-org-chip" id="app-org-chip" hidden></span>
      <a href="/app" class="{% if nav == 'home' %}active{% endif %}">ホーム</a>
      <a href="/app/login" class="nav-guest-only {% if nav == 'login' %}active{% endif %}">ログイン</a>
      <a href="/app/calendar" class="nav-auth-only {% if nav == 'calendar' %}active{% endif %}" hidden>カレンダー認証</a>
      <a href="/app/settings" class="nav-auth-only {% if nav == 'settings' %}active{% endif %}" hidden>設定</a>
      <a href="/app/campaigns" class="nav-auth-only {% if nav == 'links' %}active{% endif %}" hidden>予約リンク</a>
      <a href="/app/accounts" class="nav-admin-only {% if nav == 'accounts' %}active{% endif %}" hidden>アカウント</a>
      <span class="auth-nav" id="auth-nav-slot"></span>
      <a href="/docs" target="_blank" rel="noopener" class="nav-admin-only" hidden>API</a>
    </nav>
  </header>
  <main class="app-main {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    <span>予約デスク v{{ version }}</span>
  </footer>
  <script>
  window.__APP_VIEWER__ = {{ (app_viewer if app_viewer is defined else {'authenticated': False, 'user': None}) | tojson }};
  </script>
  <script>
  (function () {
    var orig = window.fetch;
    window.__appRawFetch = orig.bind(window);
    var busyEl = document.getElementById('app-busy-indicator');
    var busyCount = 0;
    var busyTimer = null;
    function showBusy(label) {
      if (!busyEl) return;
      busyEl.textContent = label || '読み込み中…';
      busyEl.hidden = false;
      document.body.classList.add('app-busy');
    }
    function hideBusy() {
      if (!busyEl) return;
      busyEl.hidden = true;
      document.body.classList.remove('app-busy');
    }
    function beginBusy(label) {
      if (busyTimer) clearTimeout(busyTimer);
      busyTimer = setTimeout(function () {
        if (busyCount > 0) showBusy(label);
      }, 180);
    }
    function endBusy() {
      if (busyCount <= 0) {
        busyCount = 0;
        if (busyTimer) clearTimeout(busyTimer);
        hideBusy();
      }
    }
    window.__setAppBusy = showBusy;
    window.__clearAppBusy = hideBusy;
    window.fetch = function (input, init) {
      init = init || {};
      var skipBusy = !!init.__skipBusy;
      if (skipBusy) delete init.__skipBusy;
      if (init.credentials == null) init.credentials = 'same-origin';
      if (skipBusy) {
        return orig.call(this, input, init);
      }
      busyCount += 1;
      beginBusy('読み込み中…');
      return orig.call(this, input, init).finally(function () {
        busyCount -= 1;
        endBusy();
      });
    };
    window.__loadAuthMe = function () {
      return window.fetch('/api/auth/me', { credentials: 'same-origin', __skipBusy: true })
        .then(function (r) { return r.json(); })
        .catch(function () { return { authenticated: false, user: null }; });
    };
  })();
  </script>
  {% block scripts %}{% endblock %}
  <script>
  (function () {
    var el = document.getElementById('auth-nav-slot');
    if (!el) return;
    var j = window.__APP_VIEWER__ || { authenticated: false, user: null };
    document.querySelectorAll('.nav-guest-only').forEach(function (n) {
      n.hidden = !!j.authenticated;
    });
    document.querySelectorAll('.nav-auth-only').forEach(function (n) {
      n.hidden = !j.authenticated;
    });
    var isAdmin = j.authenticated && j.user && j.user.role === 'admin';
    document.querySelectorAll('.nav-admin-only').forEach(function (n) {
      n.hidden = !isAdmin;
    });
    if (j.authenticated) {
      var orgChip = document.getElementById('app-org-chip');
      if (orgChip) {
        var orgName = j.user && j.user.default_org_name ? String(j.user.default_org_name) : '';
        orgChip.textContent = orgName || '';
        orgChip.hidden = !orgName;
      }
      el.innerHTML = '<a href="#" class="auth-nav-link" id="auth-logout-link">ログアウト</a>';
      var a = document.getElementById('auth-logout-link');
      if (a) {
        a.addEventListener('click', function (ev) {
          ev.preventDefault();
          fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).then(function () {
            try {
              localStorage.removeItem('booking_admin_secret');
              localStorage.removeItem('booking_admin_slug');
              localStorage.removeItem('booking_admin_secret_v1');
            } catch (e) {}
            window.location.href = '/app/login';
          });
        });
      }
      if (!j.user || !j.user.role || !j.user.default_org_slug) {
        var rawFetchForSession = window.__appRawFetch || window.fetch;
        window.setTimeout(function () {
          rawFetchForSession('/api/auth/me', { credentials: 'same-origin' })
            .then(function (r) { return r.json(); })
            .then(function (live) {
              if (!live || !live.authenticated || !live.user) return;
              window.__APP_VIEWER__ = live;
              var liveIsAdmin = live.user.role === 'admin';
              document.querySelectorAll('.nav-admin-only').forEach(function (n) {
                n.hidden = !liveIsAdmin;
              });
              document.querySelectorAll('.nav-auth-only').forEach(function (n) {
                n.hidden = false;
              });
              var liveOrgChip = document.getElementById('app-org-chip');
              if (liveOrgChip) {
                var liveOrgName = live.user.default_org_name ? String(live.user.default_org_name) : '';
                liveOrgChip.textContent = liveOrgName || '';
                liveOrgChip.hidden = !liveOrgName;
              }
            })
            .catch(function () {});
        }, 250);
      }
    } else {
      var orgChipOff = document.getElementById('app-org-chip');
      if (orgChipOff) {
        orgChipOff.textContent = '';
        orgChipOff.hidden = true;
      }
      el.innerHTML = '';
    }
    document.addEventListener('click', function (ev) {
      var link = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
      if (!link) return;
      var href = link.getAttribute('href') || '';
      if (!href || href.charAt(0) === '#' || link.target === '_blank' || link.hasAttribute('download')) return;
      if (href.indexOf('/app') === 0 || href.indexOf('/api') === 0) {
        window.__setAppBusy('画面を読み込み中…');
      }
    }, true);
    if (j.authenticated) {
      var prefetched = Object.create(null);
      function canPrefetch(href) {
        return href && href.indexOf('/app') === 0 && href !== window.location.pathname && !prefetched[href];
      }
      function prefetchPage(href) {
        if (!canPrefetch(href)) return;
        prefetched[href] = true;
        var rawFetch = window.__appRawFetch || window.fetch;
        rawFetch(href, {
          credentials: 'same-origin',
          headers: { 'X-Booking-Prefetch': '1' },
          cache: 'force-cache',
        }).catch(function () {
          prefetched[href] = false;
        });
      }
      document.addEventListener('pointerenter', function (ev) {
        var link = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
        if (!link) return;
        var href = link.getAttribute('href') || '';
        prefetchPage(href);
      }, true);
      document.addEventListener('focusin', function (ev) {
        var link = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
        if (!link) return;
        prefetchPage(link.getAttribute('href') || '');
      }, true);
    }
  })();
  </script>
</body>
</html>
