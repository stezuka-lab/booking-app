{% extends "base.html" %}
{% block title %}新しいパスワード{% endblock %}
{% block content %}
<div class="admin-console" style="max-width: 28rem; margin: 2rem auto">
  <h1 class="page-title">新しいパスワードを設定</h1>
  <div class="panel admin-section">
    <div class="admin-field">
      <label for="rp1">新しいパスワード（8文字以上）</label>
      <input type="password" id="rp1" autocomplete="new-password" class="booking-dialog__input-wide" />
    </div>
    <div class="admin-field">
      <label for="rp2">確認のため再入力</label>
      <input type="password" id="rp2" autocomplete="new-password" class="booking-dialog__input-wide" />
    </div>
    <p id="rp-msg" class="admin-msg err" role="alert"></p>
    <button type="button" class="btn primary" id="btn-rp">設定する</button>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function () {
  const token = {{ reset_token | tojson }};
  const msg = document.getElementById('rp-msg');
  document.getElementById('btn-rp').addEventListener('click', async function () {
    msg.textContent = '';
    const a = document.getElementById('rp1').value;
    const b = document.getElementById('rp2').value;
    if (a !== b) {
      msg.textContent = '再入力が一致しません';
      return;
    }
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, new_password: a }),
    });
    const j = await r.json().catch(function () { return {}; });
    if (!r.ok) {
      msg.textContent = (j.detail && (typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail))) || r.statusText;
      return;
    }
    alert('パスワードを更新しました。ログインしてください。');
    window.location.href = '/app/login';
  });
})();
</script>
{% endblock %}
